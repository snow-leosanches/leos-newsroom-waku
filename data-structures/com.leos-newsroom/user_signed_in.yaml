apiVersion: v1
resourceType: data-structure
meta:
  hidden: false
  schemaType: event
  customData: {}
data:
  $schema: http://iglucentral.com/schemas/com.snowplowanalytics.self-desc/schema/jsonschema/1-0-0#
  self:
    vendor: com.leos-newsroom
    name: user_signed_in
    format: jsonschema
    version: 1-0-0
  description: Fired when a user selects a role on the sign-in page and enters the app.
  type: object
  properties:
    role:
      type: string
      description: The role the user selected to sign in as.
      enum:
        - pr-manager
        - brand-analyst
        - journalist
      maxLength: 50
    destination:
      type: string
      description: The path the user is navigated to after selecting their role.
      maxLength: 256
  required:
    - role
    - destination
  additionalProperties: false
