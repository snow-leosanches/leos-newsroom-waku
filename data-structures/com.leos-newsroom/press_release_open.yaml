apiVersion: v1
resourceType: data-structure
meta:
  hidden: false
  schemaType: event
  customData: {}
data:
  $schema: http://iglucentral.com/schemas/com.snowplowanalytics.self-desc/schema/jsonschema/1-0-0#
  self:
    vendor: com.leos-newsroom
    name: press_release_open
    format: jsonschema
    version: 1-0-0
  description: Fired when a user clicks a press release headline or the "Read Full Release" button in the feed.
  type: object
  properties:
    press_release_id:
      type: string
      description: Unique identifier for the press release.
      maxLength: 100
    title:
      type: string
      description: Full headline of the press release.
      maxLength: 1024
    company:
      type: string
      description: Name of the company that issued the press release.
      maxLength: 255
    category:
      type: string
      description: Editorial category (e.g. Financial Results, M&A, Product Launch).
      maxLength: 100
    wire:
      type: string
      description: Wire service that distributed the release (e.g. PR Newswire, Business Wire, GlobeNewswire).
      maxLength: 100
  required:
    - press_release_id
    - title
    - company
    - category
    - wire
  additionalProperties: false
