apiVersion: v1
resourceType: data-structure
meta:
  hidden: false
  schemaType: event
  customData: {}
data:
  $schema: http://iglucentral.com/schemas/com.snowplowanalytics.self-desc/schema/jsonschema/1-0-0#
  self:
    vendor: com.leos-newsroom
    name: mention_clicked
    format: jsonschema
    version: 1-0-0
  description: Fired when a user clicks on a media mention headline in the monitoring dashboard.
  type: object
  properties:
    mention_id:
      type: string
      description: Unique identifier for the mention.
      maxLength: 100
    topic_id:
      type: string
      description: The monitored topic this mention belongs to.
      maxLength: 100
    headline:
      type: string
      description: Headline of the article or mention.
      maxLength: 1024
    source:
      type: string
      description: Name of the publication or outlet (e.g. TechCrunch, Reuters).
      maxLength: 255
    sentiment:
      type: string
      description: Sentiment classification of the mention.
      enum:
        - positive
        - neutral
        - negative
      maxLength: 20
  required:
    - mention_id
    - topic_id
    - headline
    - source
    - sentiment
  additionalProperties: false
