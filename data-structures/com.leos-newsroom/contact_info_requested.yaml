apiVersion: v1
resourceType: data-structure
meta:
  hidden: false
  schemaType: event
  customData: {}
data:
  $schema: http://iglucentral.com/schemas/com.snowplowanalytics.self-desc/schema/jsonschema/1-0-0#
  self:
    vendor: com.leos-newsroom
    name: contact_info_requested
    format: jsonschema
    version: 1-0-0
  description: Fired when a user clicks "Get Contact Info" on a media contact card, simulating a gated data request.
  type: object
  properties:
    contact_id:
      type: string
      description: Unique identifier for the media contact.
      maxLength: 100
    name:
      type: string
      description: Full name of the journalist or editor.
      maxLength: 255
    outlet:
      type: string
      description: Name of the outlet the contact writes for.
      maxLength: 255
  required:
    - contact_id
    - name
    - outlet
  additionalProperties: false
